services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pawtrack_db
      POSTGRES_USER: pawtrack_admin
      POSTGRES_PASSWORD: pawtrack_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawtrack_admin -d pawtrack_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pawtrack_admin:pawtrack_dev_password@db:5432/pawtrack_db
      SECRET_KEY: local_compose_secret_key_for_pawtrack_replace_before_shared_environments_123456
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5175,http://localhost:5175
      RATE_LIMIT_ENABLED: "false"
      UPLOADS_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/data/uploads

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5175"
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  uploads_data:

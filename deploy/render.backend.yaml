# Render Blueprint example for PawTrack backend + Postgres.
# Copy this file to /render.yaml when you are ready to create a Render Blueprint.
#
# Notes:
# - This uses the Dockerfile at the repo root.
# - SECRET_KEY is generated by Render.
# - DATABASE_URL is wired from the Render Postgres database.
# - The disk keeps uploaded photos across deploys. Adjust plan/size for your budget.

services:
  - type: web
    name: pawtrack-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    disk:
      name: pawtrack-uploads
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pawtrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-pawtrack-frontend.example.com
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: UPLOADS_DIR
        value: /data/uploads

databases:
  - name: pawtrack-db
    plan: basic-256mb
    databaseName: pawtrack_db
    user: pawtrack_admin
    postgresMajorVersion: "16"
